<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyLaundryReminder - Login</title>
  <link rel="stylesheet" href="/style.css?v=520" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>MyLaundryReminder</h1>
          <p>Subscriber Portal</p>
        </div>
      </div>
      <span class="badge">Portal</span>
    </div>

    <div class="grid">
      <!-- ✅ CREATE ACCOUNT (ONLY AFTER PAID CHECKOUT) -->
      <div class="card" id="createCard" style="display:none;">
        <h2>Create Account</h2>
        <p class="sub" id="paidNote">
          You just completed checkout. Create your portal login to manage pickups.
        </p>

        <label for="businessName">Business Name</label>
        <input id="businessName" placeholder="Key Cleaners" />

        <label for="createPhone">Phone</label>
        <input id="createPhone" placeholder="+14165550123" />

        <label for="createPass">Password</label>
        <input id="createPass" type="password" placeholder="At least 6 characters" />

        <div class="row" style="margin-top:10px;">
          <button class="btn primary" id="createBtn" type="button">Create Account</button>
          <button class="btn" id="copyBtn" type="button" style="display:none;">Copy Login ID</button>
          <button class="btn" id="goDashBtn" type="button" style="display:none;">Continue to Dashboard</button>
        </div>

        <div class="status" id="createStatus" style="margin-top:14px;"> </div>
      </div>

      <!-- ✅ LOGIN (DEFAULT VIEW) -->
      <div class="card" id="loginCard">
        <h2>Login</h2>
        <p class="sub">
          Enter your Login ID + password to access your dashboard.
          <br><br>
          New here? Subscribe first:
          <a href="https://portal.mylaundryreminder.com/stripe/checkout?plan=growth" style="text-decoration:underline;font-weight:900;">
            Start Free Trial
          </a>
        </p>

        <label for="loginId">Login ID</label>
        <input id="loginId" placeholder="MLR12345678" />

        <label for="loginPass">Password</label>
        <input id="loginPass" type="password" placeholder="Your password" />

        <div class="row" style="margin-top:10px;">
          <button class="btn primary" id="loginBtn" type="button">Continue</button>
          <button class="btn" id="clearBtn" type="button">Clear</button>
          <a class="btn" href="https://portal.mylaundryreminder.com/stripe/checkout?plan=growth" style="text-align:center;">
            Subscribe
          </a>
        </div>

        <div class="status" id="loginStatus" style="margin-top:14px;"> </div>
      </div>
    </div>
  </div>

  <script>
    function qs(name) {
      const u = new URL(window.location.href);
      return u.searchParams.get(name);
    }

    function setStatus(id, type, msg) {
      const el = document.getElementById(id);
      el.className = type ? `status ${type}` : "status";
      el.innerHTML = msg;
    }

    function clearSession() {
      localStorage.removeItem("ownerId");
      localStorage.removeItem("loginId");
      localStorage.removeItem("businessName");
    }

    function showCreateIfPaid() {
      const paid = qs("paid");
      const ownerId = qs("owner_id") || qs("ownerId");

      // ✅ Only show Create Account if user came from Stripe paid redirect
      if (paid === "1" && ownerId) {
        document.getElementById("createCard").style.display = "block";
        document.getElementById("paidNote").innerHTML =
          `✅ Checkout confirmed. Create your portal login now.<br><span style="opacity:.8;">Owner ID: <b>${ownerId}</b></span>`;
      } else {
        document.getElementById("createCard").style.display = "none";
      }
    }

    async function createAccount() {
      const paid = qs("paid");
      const ownerId = Number(qs("owner_id") || qs("ownerId") || 0);

      if (!(paid === "1" && ownerId)) {
        setStatus("createStatus", "err", "Create Account is only available after checkout. Please subscribe first.");
        return;
      }

      const businessName = document.getElementById("businessName").value.trim();
      const phone = document.getElementById("createPhone").value.trim();
      const password = document.getElementById("createPass").value.trim();

      if (!phone || !password) {
        setStatus("createStatus", "err", "Phone and password are required.");
        return;
      }
      if (password.length < 6) {
        setStatus("createStatus", "err", "Password must be at least 6 characters.");
        return;
      }

      setStatus("createStatus", "", "Creating account…");

      try {
        const res = await fetch("/api/create-account", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ownerId, phone, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok) {
          setStatus("createStatus", "err", `Create failed: ${data.error || "unknown error"}`);
          return;
        }

        // Save session + business name
        localStorage.setItem("ownerId", String(ownerId));
        localStorage.setItem("loginId", String(data.loginId || ""));
        if (businessName) localStorage.setItem("businessName", businessName);

        // Show result (no auto-redirect)
        setStatus(
          "createStatus",
          "ok",
          `✅ Account created.<br><br>
           Business: <b>${businessName ? businessName : "(not set)"}</b><br>
           Owner ID: <b>${ownerId}</b><br>
           Login ID: <b id="loginIdText">${data.loginId}</b><br>
           Password: <span style="opacity:.8;">(the one you just set)</span><br><br>
           Copy your Login ID, then continue to dashboard.`
        );

        document.getElementById("copyBtn").style.display = "inline-flex";
        document.getElementById("goDashBtn").style.display = "inline-flex";
      } catch (e) {
        setStatus("createStatus", "err", `Create failed: ${e.message}`);
      }
    }

    function copyLoginId() {
      const loginId = localStorage.getItem("loginId") || "";
      if (!loginId) return;
      navigator.clipboard.writeText(loginId).then(() => {
        setStatus("createStatus", "ok", document.getElementById("createStatus").innerHTML + "<br><br>✅ Login ID copied.");
      }).catch(() => {});
    }

    function goDashboard() {
      window.location.href = "/dashboard.html?v=" + Date.now();
    }

    async function login() {
      const loginId = document.getElementById("loginId").value.trim();
      const password = document.getElementById("loginPass").value.trim();

      if (!loginId || !password) {
        setStatus("loginStatus", "err", "Login ID and password are required.");
        return;
      }

      setStatus("loginStatus", "", "Signing in…");

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ loginId, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok) {
          setStatus("loginStatus", "err", `Login failed: ${data.error || "unknown error"}`);
          return;
        }

        localStorage.setItem("ownerId", String(data.ownerId));
        localStorage.setItem("loginId", String(data.loginId));
        setStatus("loginStatus", "ok", "✅ Logged in. Opening dashboard…");
        setTimeout(() => goDashboard(), 450);
      } catch (e) {
        setStatus("loginStatus", "err", `Login failed: ${e.message}`);
      }
    }

    function clearForm() {
      clearSession();
      document.getElementById("loginId").value = "";
      document.getElementById("loginPass").value = "";
      setStatus("loginStatus", "", "Cleared.");
    }

    document.getElementById("createBtn").addEventListener("click", createAccount);
    document.getElementById("copyBtn").addEventListener("click", copyLoginId);
    document.getElementById("goDashBtn").addEventListener("click", goDashboard);

    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("clearBtn").addEventListener("click", clearForm);

    document.addEventListener("DOMContentLoaded", () => {
      showCreateIfPaid();

      // Pre-fill login if session exists
      const existingLogin = localStorage.getItem("loginId");
      if (existingLogin) document.getElementById("loginId").value = existingLogin;

      // If user landed here from logout, make it clean: login-only view
      // (Create card stays hidden unless paid=1&owner_id=...)
    });
  </script>
</body>
</html>
