<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLR - Add Pickup</title>
  <link rel="stylesheet" href="/style.css?v=520" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Add Pickup</h1>
          <p>Create a pickup reminder</p>
        </div>
      </div>

      <!-- ✅ (2) Dashboard + ✅ (3) Logout/Exit -->
      <div style="display:flex; gap:12px; align-items:center;">
        <button class="btn" id="dashBtn" type="button">Dashboard</button>
        <button class="btn" id="logoutBtn" type="button">Logout</button>
        <span class="badge">Portal</span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Pickup details</h2>
        <p class="sub">Saves to database. Due date is stored exactly as YYYY-MM-DD (no timezone shift).</p>

        <label for="custName">Customer Name</label>
        <input id="custName" placeholder="Mark Wonder" />

        <label for="custPhone">Customer Phone</label>
        <input id="custPhone" placeholder="+14165550123" />

        <label for="dueDate">Due Date</label>
        <input id="dueDate" type="date" />

        <div class="row" style="margin-top:14px;">
          <button class="btn primary" id="saveBtn" type="button">Save Pickup</button>
          <button class="btn" id="backBtn" type="button">Back</button>
        </div>

        <div class="status" id="statusBox" style="margin-top:14px;">Fill the form and click Save.</div>
      </div>

      <div class="card">
        <h2>Your session</h2>
        <p class="sub" id="ownerLine">Loading…</p>
        <div class="status">
          ✅ Tip: If you pick “7th”, we store “YYYY-MM-DD = 7th” exactly (no Date() conversion).
        </div>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      localStorage.removeItem("ownerId");
      localStorage.removeItem("loginId");
      localStorage.removeItem("businessName");
      window.location.href = "https://mylaundryreminder.com/?logged_out=1";
    }

    function requireOwner() {
      const ownerId = localStorage.getItem("ownerId");
      const loginId = localStorage.getItem("loginId");
      if (!ownerId || !loginId) {
        window.location.href = "/login.html";
        return null;
      }
      return { ownerId, loginId };
    }

    function setBox(type, msg) {
      const box = document.getElementById("statusBox");
      box.className = type ? `status ${type}` : "status";
      box.innerHTML = msg;
    }

    // ✅ (2) Dashboard button
    document.getElementById("dashBtn").addEventListener("click", () => {
      window.location.href = "/dashboard.html?v=" + Date.now();
    });

    // ✅ (3) Logout button
    document.getElementById("logoutBtn").addEventListener("click", logout);

    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "/dashboard.html?v=" + Date.now();
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const info = requireOwner();
      if (!info) return;

      const name = document.getElementById("custName").value.trim();
      const phone = document.getElementById("custPhone").value.trim();

      // ✅ IMPORTANT: raw YYYY-MM-DD string (DO NOT new Date())
      const dueDate = document.getElementById("dueDate").value;

      if (!name || !phone || !dueDate) {
        setBox("err", "Please fill Customer Name, Phone, and Due Date.");
        return;
      }

      setBox("", "Saving to database…");

      try {
        const res = await fetch("/api/pickups", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ownerId: Number(info.ownerId),
            name,
            phone,
            dueDate
          })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          setBox("err", `Save failed: ${data.error || "unknown error"}`);
          return;
        }

        setBox(
          "ok",
          `✅ Pickup saved.<br>Customer: <b>${name}</b> — Due: <b>${dueDate}</b><br><span style="opacity:.85;">Opening dashboard…</span>`
        );
        setTimeout(() => window.location.href = "/dashboard.html?v=" + Date.now(), 700);
      } catch (e) {
        setBox("err", `Save failed: ${e.message}`);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      const info = requireOwner();
      if (!info) return;
      const biz = localStorage.getItem("businessName") || "";
      document.getElementById("ownerLine").innerHTML =
        `Logged in as <b>${info.loginId}</b> (Owner ID: <b>${info.ownerId}</b>)${biz ? ` • <b>${biz}</b>` : ""}`;
    });
  </script>
</body>
</html>
