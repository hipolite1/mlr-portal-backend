<script>
function getSession() {
  return {
    ownerId: localStorage.getItem("ownerId"),
    loginId: localStorage.getItem("loginId")
  };
}

function getPickups(ownerId) {
  const key = `mlr_pickups_owner_${ownerId}`;
  return JSON.parse(localStorage.getItem(key) || "[]");
}

function renderTable() {
  const { ownerId, loginId } = getSession();
  const wrap = document.getElementById("tableWrap");
  const ownerLine = document.getElementById("ownerLine");

  if (!ownerId) {
    wrap.innerHTML = "Not logged in.";
    return;
  }

  ownerLine.innerHTML =
    `Logged in as <b>${loginId}</b> (Owner ID: <b>${ownerId}</b>)`;

  const list = getPickups(ownerId);

  if (!list.length) {
    wrap.innerHTML = "No pickups yet.";
    return;
  }

  const rows = list.map((p, i) => `
    <tr>
      <td>${p.name}</td>
      <td>${p.phone}</td>
      <td>${p.dueDate}</td>
      <td><button onclick="deletePickup(${i})">Delete</button></td>
    </tr>
  `).join("");

  wrap.innerHTML = `
    <table style="width:100%; border-collapse:collapse;">
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Due</th>
        <th>Action</th>
      </tr>
      ${rows}
    </table>
  `;
}

function deletePickup(i) {
  const { ownerId } = getSession();
  const list = getPickups(ownerId);
  list.splice(i, 1);
  localStorage.setItem(`mlr_pickups_owner_${ownerId}`, JSON.stringify(list));
  renderTable();
}

document.addEventListener("DOMContentLoaded", renderTable);
</script>
