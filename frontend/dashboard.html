<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLR - Dashboard</title>
  <link rel="stylesheet" href="/style.css?v=3" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>MyLaundryReminder</h1>
          <p>Subscriber Dashboard <span style="opacity:.65;">(v3)</span></p>
        </div>
      </div>
      <span class="badge">Portal</span>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Welcome 👋</h2>
        <p class="sub" id="ownerLine">Loading…</p>

        <div class="row" style="margin-top:14px;">
          <button class="btn primary" type="button" onclick="goAddPickup()">➕ Add Pickup</button>
          <button class="btn" type="button" onclick="refreshTable()">↻ Refresh</button>
          <button class="btn" type="button" onclick="logout()">Logout</button>
        </div>

        <div class="status" id="dashStatus" style="margin-top:14px;">
          If your pickups don’t show, it’s usually domain mismatch (www vs portal) or cache.
        </div>

        <div class="status" id="debugBox" style="margin-top:12px;">
          Debug: loading…
        </div>
      </div>

      <div class="card">
        <h2>Pickups</h2>
        <p class="sub">Saved pickups for this owner (MVP local storage).</p>

        <div id="tableWrap" class="status" style="padding:14px 12px; overflow:auto;">
          Loading…
        </div>
      </div>
    </div>
  </div>

  <script>
    function requireOwner() {
      const ownerId = localStorage.getItem("ownerId");
      const loginId = localStorage.getItem("loginId");
      if (!ownerId || !loginId) {
        window.location.href = "/login.html";
        return null;
      }
      return { ownerId, loginId };
    }

    function goAddPickup() {
      window.location.href = "/add-pickup.html?v=3";
    }

    function logout() {
      localStorage.removeItem("ownerId");
      localStorage.removeItem("loginId");
      window.location.href = "/login.html";
    }

    function getPickups(ownerId) {
      const key = `mlr_pickups_owner_${ownerId}`;
      return JSON.parse(localStorage.getItem(key) || "[]");
    }

    function setPickups(ownerId, list) {
      const key = `mlr_pickups_owner_${ownerId}`;
      localStorage.setItem(key, JSON.stringify(list));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(v) {
      try {
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return String(v || "");
        return d.toDateString();
      } catch { return String(v || ""); }
    }

    function deletePickup(displayIndex) {
      const info = requireOwner();
      if (!info) return;

      const original = getPickups(info.ownerId);        // oldest -> newest
      const display = original.slice().reverse();       // newest -> oldest

      if (displayIndex < 0 || displayIndex >= display.length) return;

      display.splice(displayIndex, 1);

      const updated = display.slice().reverse();
      setPickups(info.ownerId, updated);
      renderTable(updated);
      refreshDebug(updated.length);
    }

    function renderTable(list) {
      const wrap = document.getElementById("tableWrap");

      if (!list.length) {
        wrap.className = "status";
        wrap.style.padding = "14px 12px";
        wrap.innerHTML = "No pickups yet. Click <b>Add Pickup</b> to create your first one.";
        return;
      }

      const display = list.slice().reverse();

      const rows = display.map((p, i) => `
        <tr>
          <td style="padding:12px; border-bottom:1px solid rgba(15,23,42,.10);">
            <b>${escapeHtml(p.name || "")}</b><br>
            <span style="opacity:.85;">${escapeHtml(p.phone || "")}</span>
          </td>
          <td style="padding:12px; border-bottom:1px solid rgba(15,23,42,.10);">
            ${escapeHtml(formatDate(p.dueDate))}
          </td>
          <td style="padding:12px; border-bottom:1px solid rgba(15,23,42,.10);">
            <span style="opacity:.85;">${escapeHtml(formatDate(p.createdAt))}</span>
          </td>
          <td style="padding:12px; border-bottom:1px solid rgba(15,23,42,.10); text-align:right;">
            <button class="btn" type="button" onclick="deletePickup(${i})">Delete</button>
          </td>
        </tr>
      `).join("");

      wrap.className = "";
      wrap.style.padding = "0";
      wrap.innerHTML = `
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr>
              <th style="text-align:left; padding:12px; border-bottom:1px solid rgba(15,23,42,.12);">Customer</th>
              <th style="text-align:left; padding:12px; border-bottom:1px solid rgba(15,23,42,.12);">Due</th>
              <th style="text-align:left; padding:12px; border-bottom:1px solid rgba(15,23,42,.12);">Created</th>
              <th style="text-align:right; padding:12px; border-bottom:1px solid rgba(15,23,42,.12);">Action</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function refreshDebug(count) {
      const info = requireOwner();
      if (!info) return;

      const key = `mlr_pickups_owner_${info.ownerId}`;
      const raw = localStorage.getItem(key);

      document.getElementById("debugBox").innerHTML =
        `Debug:<br>
         Domain: <b>${location.host}</b><br>
         OwnerId: <b>${info.ownerId}</b><br>
         Storage key: <b>${key}</b><br>
         Count: <b>${count}</b><br>
         Raw (first 120 chars): <span style="opacity:.75;">${escapeHtml(String(raw || "").slice(0,120))}</span>`;
    }

    function refreshTable() {
      const info = requireOwner();
      if (!info) return;

      const list = getPickups(info.ownerId);
      renderTable(list);
      refreshDebug(list.length);

      const ds = document.getElementById("dashStatus");
      ds.className = "status ok";
      ds.innerHTML = `✅ Loaded <b>${list.length}</b> pickup(s).`;
      setTimeout(() => { ds.className = "status"; }, 1200);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const info = requireOwner();
      if (!info) return;

      document.getElementById("ownerLine").innerHTML =
        `Logged in as <b>${info.loginId}</b> (Owner ID: <b>${info.ownerId}</b>)`;

      refreshTable();
    });
  </script>
</body>
</html>
